name: Build

on:
  push:
  pull_request:
    branches:
    - main
    - release-*

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      is-release: ${{ steps.version.outputs.is-release }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine Version
        id: version
        uses: CenterEdge/actions/dotnet/nuget-version@v1
        with:
          tag-prefix: release/

  build:
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - uses: actions/cache@v6
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Install dependencies
      working-directory: ./src/main
      run: dotnet restore

    - name: Build
      working-directory: ./src/main
      run: dotnet build --configuration Release -p:Version=${{ needs.version.outputs.version  }} --no-restore
    - name: Test
      working-directory: ./src/main
      run: >-
        dotnet test
        --configuration Release
        --no-build
        --report-github
        --report-github-summary-include-passed
        --report-github-summary-include-skipped
    - name: Test Generate
      run: ./scripts/generate.sh

    - name: Pack
      working-directory: ./src/main
      run: dotnet pack --configuration Release -p:Version=${{ needs.version.outputs.version }}
      # Note: SDK is packed by build above, doesn't need to be packed here
    - name: Push to NuGet.org
      if: ${{ needs.version.outputs.is-release == 'true' }}
      working-directory: ./src/artifacts/package
      run: |
        dotnet nuget push **/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
    - name: Push to GitHub Packages
      if: ${{ startsWith(github.ref, 'refs/pull/') || needs.version.outputs.is-release == 'true' }}
      working-directory: ./src/artifacts/package
      run: |
        dotnet nuget push **/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/CenterEdge/index.json --skip-duplicate

  build-sdk:
    # SDK must be built on Windows to support building ReadyToRun images for multiple platforms
    runs-on: windows-latest
    needs: version
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - uses: actions/cache@v6
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    - name: Install dependencies
      working-directory: ./src/main
      run: dotnet restore
    - name: Install SDK dependencies
      working-directory: ./src/sdk
      run: dotnet restore Yardarm.Sdk.slnx

    - name: Build SDK
      working-directory: ./src/sdk
      run: dotnet build --configuration Release -p:Version=${{ needs.version.outputs.version  }} --no-restore Yardarm.Sdk.slnx
    - name: Test Generate
      run: ./scripts/generate-sdk.sh

    # Note: SDK is packed by build above, doesn't need to be packed here
    - name: Push to NuGet.org
      if: ${{ needs.version.outputs.is-release == 'true' }}
      working-directory: ./src/artifacts/package
      run: |
        dotnet nuget push **/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
    - name: Push to GitHub Packages
      if: ${{ startsWith(github.ref, 'refs/pull/') || needs.version.outputs.is-release == 'true' }}
      working-directory: ./src/artifacts/package
      run: |
        dotnet nuget push **/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/CenterEdge/index.json --skip-duplicate

  docker:
    runs-on: ubuntu-latest
    needs: version
    permissions:
      packages: write

    steps:
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/centeredge/yardarm
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}},value=${{ needs.version.outputs.version }}
          type=sha

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/build-push-action@v7
      with:
        platforms: linux/amd64,linux/arm64
        build-args: VERSION=${{ needs.version.outputs.version }}
        push: ${{ needs.version.outputs.is-release == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        provenance: true
        sbom: true
